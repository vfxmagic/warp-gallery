<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>VFXMAGIC — Warp Gallery</title>
<meta name="description" content="VFXMAGIC signature hero — a scroll-warping 3D image gallery (Three.js + GSAP)." />
<style>
  :root{
    --bg:#07080b;
    --ink:#f4f1ea;
    --muted:#8a8d96;
    --green:#9be870;          /* the VFXMAGIC green-A accent */
    --line:rgba(244,241,234,.14);
    --font: "Helvetica Neue", Inter, system-ui, -apple-system, Arial, sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    cursor:none;
  }
  canvas{display:block}
  #gl{position:fixed;inset:0;z-index:1}

  /* ---------- chrome over the canvas ---------- */
  .chrome{position:fixed;inset:0;z-index:5;pointer-events:none}
  .chrome a,.chrome button{pointer-events:auto}

  header.bar{
    position:fixed;top:0;left:0;right:0;z-index:6;
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 34px;
    mix-blend-mode:difference;     /* the "difference" trick from site #3 — texture, not a 2nd showpiece */
  }
  header.bar .logo{display:flex;align-items:center;gap:14px;text-decoration:none}
  header.bar .logo img{height:18px;width:auto;display:block;filter:brightness(1.7)}
  header.bar nav{display:flex;gap:30px}
  header.bar nav a,
  header.bar .menu{
    color:var(--ink);text-decoration:none;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    font-weight:500;background:none;border:0;font-family:inherit;
  }
  header.bar nav a{opacity:.78;transition:opacity .3s}
  header.bar nav a:hover{opacity:1}

  /* kicker top-left under logo */
  .kicker{
    position:fixed;left:34px;top:64px;z-index:6;
    font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
  }

  /* big editorial title, bottom-left */
  .hero-title{
    position:fixed;left:30px;bottom:30px;z-index:6;
    line-height:.86;font-weight:700;letter-spacing:-.02em;
    font-size:clamp(46px,10vw,150px);
    text-transform:uppercase;
    mix-blend-mode:difference;
  }
  .hero-title .ln{display:block;overflow:hidden}
  .hero-title .ln > span{display:block;transform:translateY(110%)}

  /* index + caption, bottom-right */
  .meta{
    position:fixed;right:34px;bottom:32px;z-index:6;text-align:right;
  }
  .meta .cap{
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);
    min-height:16px;transition:opacity .25s;
  }
  .meta .idx{font-size:10.5px;letter-spacing:.2em;color:var(--muted);margin-top:10px}
  .meta .idx b{color:var(--ink);font-weight:600}

  /* layout toggle, top-right-ish under nav */
  .modes{
    position:fixed;right:34px;top:64px;z-index:6;
    display:flex;gap:4px;align-items:center;
  }
  .modes button{
    font-family:inherit;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--muted);background:none;border:0;padding:6px 8px;position:relative;transition:color .3s;
  }
  .modes button.on{color:var(--ink)}
  .modes button.on::after{
    content:"";position:absolute;left:8px;right:8px;bottom:2px;height:1px;background:var(--green);
  }
  .modes .sep{width:1px;height:11px;background:var(--line)}

  /* scroll hint, bottom-center */
  .hint{
    position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:6;
    font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:10px;
  }
  .hint .dash{width:34px;height:1px;background:var(--line);position:relative;overflow:hidden}
  .hint .dash::after{content:"";position:absolute;inset:0;background:var(--green);
    transform:translateX(-100%);animation:sweep 2.6s infinite}
  @keyframes sweep{0%{transform:translateX(-100%)}50%{transform:translateX(0)}100%{transform:translateX(100%)}}

  /* ---------- custom cursor ---------- */
  .cursor{position:fixed;top:0;left:0;z-index:50;pointer-events:none;mix-blend-mode:difference}
  .cur-dot{position:fixed;width:7px;height:7px;border-radius:50%;background:var(--ink);
    transform:translate(-50%,-50%);transition:width .25s,height .25s,background .25s}
  .cur-ring{position:fixed;width:34px;height:34px;border:1px solid rgba(244,241,234,.5);border-radius:50%;
    transform:translate(-50%,-50%);transition:transform .2s ease,opacity .3s;display:grid;place-items:center}
  .cur-ring span{font-size:8px;letter-spacing:.18em;text-transform:uppercase;opacity:0;transition:opacity .25s}
  body.hovering .cur-ring{width:74px;height:74px;border-color:transparent}
  body.hovering .cur-ring span{opacity:1}
  body.hovering .cur-dot{width:0;height:0}
  body.dragging .cur-ring{transform:translate(-50%,-50%) scale(.7)}

  /* ---------- loader ---------- */
  #loader{position:fixed;inset:0;z-index:80;background:var(--bg);display:grid;place-items:center}
  #loader .lwrap{display:flex;flex-direction:column;align-items:center;gap:22px}
  #loader img{height:24px;filter:brightness(1.7);opacity:0}
  #loader .lbar{width:180px;height:1px;background:var(--line);position:relative;overflow:hidden}
  #loader .lbar i{position:absolute;inset:0;transform-origin:left;transform:scaleX(0);background:var(--green)}
  #loader .lnum{font-size:10px;letter-spacing:.24em;color:var(--muted)}

  .corner{position:fixed;z-index:6;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .corner.tr{display:none}

  /* ---------- lightbox (click a frame to enlarge) ---------- */
  #lightbox{
    position:fixed;inset:0;z-index:70;display:none;place-items:center;
    background:rgba(5,6,9,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    opacity:0;transition:opacity .38s ease;padding:6vmin;
  }
  #lightbox.show{opacity:1}
  body.lb-open{cursor:auto}
  body.lb-open .cursor{display:none}
  .lb-fig{margin:0;display:flex;flex-direction:column;align-items:center;gap:18px;
    transform:scale(.94);transition:transform .45s cubic-bezier(.16,1,.3,1)}
  #lightbox.show .lb-fig{transform:scale(1)}
  .lb-fig img{max-width:88vw;max-height:80vh;width:auto;height:auto;display:block;
    box-shadow:0 40px 120px rgba(0,0,0,.6);border-radius:2px}
  .lb-cap{display:flex;align-items:baseline;gap:16px;width:100%;justify-content:space-between;
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink)}
  .lb-cap b{color:var(--muted);font-weight:500;letter-spacing:.2em}
  .lb-close{position:fixed;top:24px;right:30px;z-index:72;background:none;border:0;cursor:pointer;
    color:var(--ink);font-size:30px;line-height:1;width:44px;height:44px;border-radius:50%;
    transition:background .25s;font-family:inherit}
  .lb-close:hover{background:rgba(244,241,234,.1)}

  @media (max-width:760px){
    header.bar{padding:18px 20px}
    header.bar nav{display:none}
    .kicker{display:none}
    .modes{top:54px;right:20px}
    .hero-title{left:18px;bottom:74px}
    .meta{right:20px;bottom:20px}
    .hint{display:none}
    body{cursor:auto}.cursor{display:none}
  }
</style>
</head>
<body>
  <canvas id="gl"></canvas>

  <div class="chrome">
    <header class="bar">
      <a class="logo" href="https://vfxmagic.com.au" aria-label="VFXMAGIC home">
        <img id="logo" alt="VFXMAGIC" />
      </a>
      <nav>
        <a href="#">Work</a>
        <a href="#">Studio</a>
        <a href="#">Reel</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <div class="kicker">Selected Work — Vol. 01</div>

    <div class="modes" role="group" aria-label="Layout">
      <button id="m-gallery" class="on">Gallery</button>
      <span class="sep"></span>
      <button id="m-spiral">Reel</button>
    </div>

    <h1 class="hero-title" id="title"></h1>

    <div class="meta">
      <div class="cap" id="cap">Drag · Scroll</div>
      <div class="idx"><b id="idxCur">01</b> / <span id="idxTot">10</span></div>
    </div>

    <div class="hint"><span class="dash"></span>Scroll to warp</div>
  </div>

  <!-- custom cursor -->
  <div class="cursor" aria-hidden="true">
    <div class="cur-ring" id="curRing"><span>View</span></div>
    <div class="cur-dot" id="curDot"></div>
  </div>

  <!-- lightbox (click a frame to enlarge) -->
  <div id="lightbox" aria-hidden="true">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <figure class="lb-fig">
      <img id="lbImg" alt="" />
      <figcaption class="lb-cap"><span id="lbTitle"></span><b id="lbIdx"></b></figcaption>
    </figure>
  </div>

  <!-- loader -->
  <div id="loader">
    <div class="lwrap">
      <img id="llogo" alt="VFXMAGIC" />
      <div class="lbar"><i id="lbar"></i></div>
      <div class="lnum"><span id="lnum">0</span>%</div>
    </div>
  </div>

<script src="./vendor/gsap.min.js"></script>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>

/* ---------- procedural placeholder texture (always works) ---------- */
function placeholderTexture(i, title){
  const w=1600, h=900;          // 16:9 — matches the real film frames
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const x=c.getContext('2d');
  // moody hue per slot — bright enough to read as an image, desaturates to B&W by default
  const hue=(i*37)%360;
  const g=x.createLinearGradient(0,0,w,h);
  g.addColorStop(0,`hsl(${hue},48%,58%)`);
  g.addColorStop(.55,`hsl(${(hue+24)%360},44%,38%)`);
  g.addColorStop(1,`hsl(${(hue+40)%360},36%,20%)`);
  x.fillStyle=g; x.fillRect(0,0,w,h);
  // soft radial light
  const r=x.createRadialGradient(w*0.5,h*0.4,40,w*0.5,h*0.45,w*0.6);
  r.addColorStop(0,'rgba(255,255,255,.26)'); r.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=r; x.fillRect(0,0,w,h);
  // grain
  for(let k=0;k<14000;k++){
    x.fillStyle=`rgba(255,255,255,${Math.random()*0.05})`;
    x.fillRect(Math.random()*w, Math.random()*h, 1, 1);
  }
  // vignette
  const v=x.createRadialGradient(w/2,h/2,h*0.35,w/2,h/2,w*0.62);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,.55)');
  x.fillStyle=v; x.fillRect(0,0,w,h);
  // index + title + label
  x.fillStyle='rgba(244,241,234,.92)';
  x.font='800 150px "Helvetica Neue", Arial';
  x.fillText(String(i+1).padStart(2,'0'), 56, 170);
  x.font='700 64px "Helvetica Neue", Arial';
  x.fillText(title, 56, h-120);
  x.fillStyle='rgba(155,232,112,.95)';
  x.font='600 26px "Helvetica Neue", Arial';
  x.fillText('VFXMAGIC · PLACEHOLDER PLATE', 56, h-72);
  const t=new THREE.CanvasTexture(c);
  t.colorSpace=THREE.SRGBColorSpace;
  t.userData={w,h};
  return t;
}

const canvas=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42, innerWidth/innerHeight, .1, 100);
camera.position.set(0,0,11.0);

const PW=4.8, PH=2.7;          // plane size — 16:9 film frame
const SPACING=6.0;             // horizontal (Gallery) strip spacing
const TOTAL=N*SPACING;
const isMobile=innerWidth<760;
// vertical film-reel (unravel) layout constants
const REEL_GAP=1.0,     // ribbon spacing per frame
      REEL_RISE=3.15,   // vertical world units between frames (≈ frame height → film strip)
      REEL_R=3.25,      // coil radius (side-swing + depth) — bigger = more obvious swirl
      REEL_TWIST=1.12,  // radians of coil per frame (the swirl rate)
      REEL_FACE=0.72,   // how much each frame turns to follow the coil
      REEL_TILT=0.06,   // slight unspool tilt
      REEL_SCROLL=0.62; // scroll → vertical travel gain

const geo=new THREE.PlaneGeometry(PW,PH,48,2);

const vert=`
  uniform float uVelo;     // signed scroll velocity
  uniform float uArc;      // permanent gentle convex
  varying vec2 vUv;
  void main(){
    vUv=uv;
    vec3 p=position;
    float ax=(uv.x-0.5);
    // velocity-driven curl around the vertical axis (the warp)
    p.z += sin(uv.x*3.14159265) * uVelo * 2.6;
    // small permanent arc so a still strip already feels 3D
    p.z -= ax*ax * uArc;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);
  }
`;
const frag=`
  precision highp float;
  uniform sampler2D uTex;
  uniform vec2  uTexSize;
  uniform vec2  uQuad;
  uniform float uHover;    // 0 grayscale .. 1 colour
  uniform float uOpacity;
  varying vec2 vUv;
  vec2 cover(vec2 uv){
    vec2 r=vec2(
      min((uQuad.x/uQuad.y)/(uTexSize.x/uTexSize.y),1.0),
      min((uQuad.y/uQuad.x)/(uTexSize.y/uTexSize.x),1.0)
    );
    return vec2(uv.x*r.x+(1.0-r.x)*.5, uv.y*r.y+(1.0-r.y)*.5);
  }
  void main(){
    vec2 uv=cover(vUv);
    vec3 tex=texture2D(uTex,uv).rgb;
    float g=dot(tex,vec3(.299,.587,.114));
    vec3 col=mix(vec3(g), tex, uHover);        // B&W -> colour on hover
    col += uHover*0.05;                         // tiny lift when active
    // edge darken
    float ex=smoothstep(0.0,0.04,vUv.x)*smoothstep(1.0,0.96,vUv.x);
    float ey=smoothstep(0.0,0.03,vUv.y)*smoothstep(1.0,0.97,vUv.y);
    col*=mix(0.82,1.0,ex*ey);
    gl_FragColor=vec4(col, uOpacity);
  }
`;

const group=new THREE.Group();
scene.add(group);
const items=[];

for(let i=0;i<N;i++){
  const tex=placeholderTexture(i, PLATES[i].title);
  const mat=new THREE.ShaderMaterial({
    uniforms:{
      uTex:{value:tex},
      uTexSize:{value:new THREE.Vector2(tex.userData.w,tex.userData.h)},
      uQuad:{value:new THREE.Vector2(PW,PH)},
      uVelo:{value:0},
      uArc:{value:0.9},
      uHover:{value:0},
      uOpacity:{value:0},
    },
    vertexShader:vert, fragmentShader:frag, transparent:true,
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.userData={i, hover:0, hoverTarget:0, title:PLATES[i].title};
  group.add(mesh);
  items.push(mesh);

  // try to load a real plate; swap in on success
  if(PLATES[i].src){
    new THREE.TextureLoader().load(PLATES[i].src, (t)=>{
      t.colorSpace=THREE.SRGBColorSpace;
      mat.uniforms.uTex.value=t;
      mat.uniforms.uTexSize.value.set(t.image.width, t.image.height);
    }, undefined, ()=>{ /* keep placeholder */ });
  }
}

/* ---------- layout: morph between the horizontal Gallery strip
   and the vertical Reel (a film strip unravelling / swirling up
   a coiled axis) ---------- */
let morph=0;                 // 0 = gallery strip, 1 = reel
let morphTarget=0;
const REEL_SPAN=N*REEL_GAP;

function layout(scroll){
  for(const m of items){
    const i=m.userData.i;

    // ---- GALLERY: horizontal strip (scroll moves sideways) ----
    let sx = ((i*SPACING - scroll) % TOTAL + TOTAL) % TOTAL - TOTAL/2;
    let sy = 0;
    let sz = -Math.abs(sx)*0.12;            // arc the row back at the edges
    let sry = -sx*0.04;                     // turn to face centre
    const stripEdge = 1.0 - smooth01((Math.abs(sx)-TOTAL/2+SPACING*1.4)/(SPACING*1.2));

    // ---- REEL: vertical film-strip unravelling around a coiled axis ----
    // t = where this frame sits along the ribbon (recycles → endless reel)
    let t = ((i*REEL_GAP - scroll*REEL_SCROLL) % REEL_SPAN + REEL_SPAN) % REEL_SPAN - REEL_SPAN/2;
    const coil = t * REEL_TWIST;            // the swirl angle at this point on the strip
    let rx = Math.sin(coil) * REEL_R;       // swing left/right as it coils
    let rz = (Math.cos(coil) - 1) * REEL_R; // wrap toward / away from camera
    let ry = -t * REEL_RISE;                // VERTICAL travel — the up-and-down unravel
    let rry = coil * REEL_FACE;             // frames turn to follow the coil
    let rrx = -t * REEL_TILT;               // slight unspool tilt
    let rrz = Math.sin(coil) * 0.10;        // tiny roll for the ribbon feel
    const reelEdge = 1.0 - smooth01((Math.abs(t)-(REEL_SPAN/2-REEL_GAP*1.6))/(REEL_GAP*1.3));

    // ---- morph between the two ----
    m.position.x = sx + (rx-sx)*morph;
    m.position.y = sy + (ry-sy)*morph;
    m.position.z = sz + (rz-sz)*morph;
    m.rotation.x = (rrx)*morph;
    m.rotation.y = sry + (rry-sry)*morph;
    m.rotation.z = (rrz)*morph;

    m._edge = THREE.MathUtils.clamp(stripEdge*(1-morph) + reelEdge*morph, 0, 1);
  }
}
function smooth01(x){ x=THREE.MathUtils.clamp(x,0,1); return x*x*(3-2*x); }

/* ============================================================
   scroll + velocity
   ============================================================ */
let target=0, current=0, prev=0, velo=0;
function onWheel(e){ target += e.deltaY*0.006; }
addEventListener('wheel', onWheel, {passive:true});

// drag (pointer) + touch — plus tap-to-enlarge detection
let dragging=false, lastX=0, moved=0;
function down(x){ if(lbOpen) return; dragging=true; lastX=x; moved=0; document.body.classList.add('dragging'); }
function move(x){ if(!dragging) return; const dx=x-lastX; target -= dx*0.02; moved+=Math.abs(dx); lastX=x; }
function up(x,e){
  if(!dragging) return;
  dragging=false; document.body.classList.remove('dragging');
  // a tap (little movement) on a frame opens the lightbox
  if(moved<6 && !lbOpen && e && e.target===canvas) tryOpenAt(x, e._y);
}
addEventListener('pointerdown', e=>down(e.clientX));
addEventListener('pointermove',  e=>move(e.clientX));
addEventListener('pointerup', e=>{ e._y=e.clientY; up(e.clientX, e); });
addEventListener('pointercancel', ()=>{ dragging=false; document.body.classList.remove('dragging'); });
addEventListener('touchstart', e=>down(e.touches[0].clientX), {passive:true});
addEventListener('touchmove',  e=>move(e.touches[0].clientX), {passive:true});
addEventListener('touchend', e=>{ const t=e.changedTouches[0]; up(t.clientX, {target:canvas, _y:t.clientY}); });

/* ---------- raycast hover ---------- */
const ray=new THREE.Raycaster();
const pointer=new THREE.Vector2(-2,-2);
let hovered=null;
addEventListener('pointermove', e=>{
  pointer.x=(e.clientX/innerWidth)*2-1;
  pointer.y=-(e.clientY/innerHeight)*2+1;
  cursor.tx=e.clientX; cursor.ty=e.clientY;
});

const capEl=document.getElementById('cap');
const idxEl=document.getElementById('idxCur');

/* ---------- lightbox: click a frame to enlarge ---------- */
const lb=document.getElementById('lightbox');
const lbImg=document.getElementById('lbImg');
const lbTitle=document.getElementById('lbTitle');
const lbIdx=document.getElementById('lbIdx');
const lbClose=document.getElementById('lbClose');
let lbOpen=false;
const _ndc=new THREE.Vector2();

function tryOpenAt(x,y){
  _ndc.x=(x/innerWidth)*2-1; _ndc.y=-(y/innerHeight)*2+1;
  ray.setFromCamera(_ndc,camera);
  const hit=ray.intersectObjects(items,false)[0];
  if(hit) openLightbox(hit.object);
}
function openLightbox(mesh){
  const i=mesh.userData.i;
  let src=PLATES[i].src;
  if(!src){ const img=mesh.material.uniforms.uTex.value.image; if(img&&img.toDataURL) src=img.toDataURL(); }
  lbImg.src=src||''; lbImg.alt=mesh.userData.title;
  lbTitle.textContent=mesh.userData.title;
  lbIdx.textContent=String(i+1).padStart(2,'0')+' / '+String(N).padStart(2,'0');
  lbOpen=true; document.body.classList.add('lb-open');
  lb.style.display='grid';
  void lb.offsetHeight;          // force reflow so the fade runs even if rAF is throttled
  lb.classList.add('show');
}
function closeLightbox(){
  lbOpen=false; lb.classList.remove('show'); document.body.classList.remove('lb-open');
  setTimeout(()=>{ if(!lbOpen){ lb.style.display='none'; lbImg.src=''; } }, 400);
}
lbClose.addEventListener('click', closeLightbox);
lb.addEventListener('click', e=>{ if(e.target===lb) closeLightbox(); });   // click backdrop to close
addEventListener('keydown', e=>{ if(e.key==='Escape'&&lbOpen) closeLightbox(); });

/* ---------- custom cursor ---------- */
const curDot=document.getElementById('curDot'), curRing=document.getElementById('curRing');
const cursor={x:innerWidth/2,y:innerHeight/2,tx:innerWidth/2,ty:innerHeight/2};

/* ============================================================
   render loop
   ============================================================ */
let started=false;
function tick(){
  requestAnimationFrame(tick);

  // smooth scroll + velocity
  current += (target-current)*0.08;
  velo += ((current-prev)-velo)*0.12;
  prev=current;
  const veloClamped=THREE.MathUtils.clamp(velo, -1.6, 1.6);

  morph += (morphTarget-morph)*0.07;

  layout(current);

  // hover detection
  if(started){
    ray.setFromCamera(pointer, camera);
    const hit=ray.intersectObjects(items, false)[0];
    const now = hit ? hit.object : null;
    if(now!==hovered){
      hovered=now;
      document.body.classList.toggle('hovering', !!hovered);
      if(hovered){
        capEl.textContent=hovered.userData.title;
        idxEl.textContent=String(hovered.userData.i+1).padStart(2,'0');
      } else {
        capEl.textContent = morphTarget>0.5 ? 'Reel · unravel' : 'Drag · Scroll';
      }
    }
  }

  // per-plane uniforms
  for(const m of items){
    m.userData.hoverTarget = (m===hovered)?1:0;
    m.userData.hover += (m.userData.hoverTarget-m.userData.hover)*0.12;
    const u=m.material.uniforms;
    u.uHover.value=m.userData.hover;
    u.uVelo.value=veloClamped;
    // edge fade only — planes are always visible; the loader overlay covers them during intro
    u.uOpacity.value = (m._edge!==undefined?m._edge:1);
    // a touch of scale on hover
    const s=1+m.userData.hover*0.04;
    m.scale.setScalar(s);
  }

  // cursor follow
  cursor.x+=(cursor.tx-cursor.x)*0.2; cursor.y+=(cursor.ty-cursor.y)*0.2;
  curDot.style.transform=`translate(${cursor.x}px,${cursor.y}px) translate(-50%,-50%)`;
  curRing.style.transform=`translate(${cursor.x}px,${cursor.y}px) translate(-50%,-50%)`;
  curDot.style.left=curDot.style.top='0px'; curRing.style.left=curRing.style.top='0px';

  renderer.render(scene,camera);
}
tick();

/* ============================================================
   mode toggle
   ============================================================ */
const mg=document.getElementById('m-gallery'), ms=document.getElementById('m-spiral');
function setMode(spiral){
  morphTarget=spiral?1:0;
  mg.classList.toggle('on',!spiral); ms.classList.toggle('on',spiral);
  capEl.textContent = spiral?'Reel · unravel':'Drag · Scroll';
}
mg.onclick=()=>setMode(false);
ms.onclick=()=>setMode(true);

/* ============================================================
   intro (GSAP) — branded loader, then reveal
   ============================================================ */
// split hero title into two reveal lines
const titleEl=document.getElementById('title');
['SELECTED', 'WORK'].forEach(word=>{
  const ln=document.createElement('span'); ln.className='ln';
  const sp=document.createElement('span'); sp.textContent=word;
  ln.appendChild(sp); titleEl.appendChild(ln);
});

// Clear the loader + reveal the page. Uses DIRECT style writes (CSS transitions, real
// timers) so it ALWAYS completes — even if rAF/GSAP was throttled because the tab was
// backgrounded during load. Idempotent.
function forceReady(){
  if(window.__ready) return; window.__ready=true;
  started=true;
  const ld=document.getElementById('loader');
  ld.style.transition='opacity .5s ease';
  ld.style.opacity='0';
  setTimeout(()=>{ ld.style.display='none'; }, 520);
  document.querySelectorAll('#title .ln > span').forEach(s=>{
    s.style.transition='transform .9s cubic-bezier(.16,1,.3,1)';
    s.style.transform='translateY(0)';
  });
}

// Pretty path (runs when the tab is visible): animate the branded loader, then reveal.
window.addEventListener('load', ()=>{
  gsap.timeline({onComplete:forceReady})
    .add(()=>{ started=true; })
    .to('#llogo',{opacity:1,duration:.6,ease:'power2.out'})
    .to('#lbar',{scaleX:1,duration:1.0,ease:'power2.inOut'},'-=.2')
    .to({v:0},{v:100,duration:1.0,ease:'power2.inOut',
      onUpdate:function(){ document.getElementById('lnum').textContent=Math.round(this.targets()[0].v); }},'<');
});

// Bulletproof fallbacks: a hard timer, and a kick whenever the tab regains focus.
setTimeout(forceReady, 2800);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) setTimeout(forceReady, 60); });

/* ---------- resize ---------- */
addEventListener('resize', ()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
});
</script>
</body>
</html>
